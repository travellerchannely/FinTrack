<!doctype html>

.exp-tbl tr:last-child td{border-bottom:none}.exp-tbl tr:hover td{background:#12151c}

.bt{display:inline-flex;align-items:center;justify-content:center;padding:0 9px;height:24px;border-radius:4px;font-size:12px;font-weight:500;font-family:var(--fm);line-height:1;white-space:nowrap}

select.inp{cursor:pointer}.inp-sm{padding:5px 9px;font-size:12px;border-radius:5px;height:auto}

.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-family:var(--ff);font-size:14px;font-weight:500;transition:all .15s}
.bp{background:var(--ac);color:#000}.bp:hover{background:var(--ac2)}
.bg{background:var(--s2);color:var(--t1);border:1px solid var(--b1)}.bg:hover{background:var(--s3)}
.brd{background:var(--rdd);color:var(--rd);border:1px solid rgba(255,77,109,.3)}.brd:hover{background:rgba(255,77,109,.2)}
.bs{padding:6px 11px;font-size:13px}
.fi{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.pb2{height:5px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:2px}
.cb{width:17px;height:17px;border:1.5px solid var(--b2);border-radius:3px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;background:var(--s2);flex-shrink:0}
.cb.c{background:var(--ac);border-color:var(--ac);color:#000}
.tc2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.em{text-align:center;padding:60px 20px;color:var(--t3)}
.alrt{padding:11px 16px;border-radius:7px;font-size:14px;margin-bottom:16px}
.ai{background:rgba(72,149,239,.1);border:1px solid rgba(72,149,239,.2);color:#4895ef}
.as{background:var(--acd);border:1px solid var(--acd2);color:var(--ac)}
.chevron{display:inline-block;transition:transform .2s;font-size:11px;color:var(--t3);margin-right:6px}
.chevron.open{transform:rotate(90deg)}
.bb{background:var(--s2);border:1px solid var(--acd2);border-radius:9px;padding:13px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.md{background:var(--s1);border:1px solid var(--b2);border-radius:18px;padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.mdt{font-size:18px;font-weight:600;margin-bottom:20px}
.fr{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fl{font-size:11px;color:var(--t3);font-family:var(--fm);letter-spacing:.5px;text-transform:uppercase}
.fr .inp{width:100%}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.uz{border:2px dashed var(--b2);border-radius:9px;padding:48px;text-align:center;cursor:pointer;transition:all .2s}
.uz:hover,.uz.dr{border-color:var(--ac);background:var(--acd)}
.pb{display:flex;align-items:center;gap:7px;justify-content:center;padding-top:16px}
.pbt{padding:5px 10px;border-radius:5px;border:1px solid var(--b1);background:var(--s2);color:var(--t2);cursor:pointer;font-size:13px;font-family:var(--fm)}
.pbt:hover{background:var(--s3)}.pbt.a{background:var(--ac);color:#000;border-color:var(--ac)}
.pi{color:var(--t3);font-size:13px;font-family:var(--fm)}
.tF{background:rgba(255,200,50,.12);color:#ffd60a}.tP{background:rgba(255,120,50,.12);color:#ff8c42}
.tB{background:rgba(72,149,239,.12);color:#4895ef}.tBr{background:rgba(167,100,255,.12);color:#a764ff}
.tR{background:rgba(0,229,160,.12);color:#00e5a0}
.ti{background:rgba(0,229,160,.1);color:var(--ac);border:1px solid var(--acd2);padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--fm)}
.to{background:var(--rdd);color:var(--rd);border:1px solid rgba(255,77,109,.2);padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--fm)}
.del-row td{color:var(--t3)!important;text-decoration:line-through;background:rgba(255,77,109,.04)!important}
.cdp{position:absolute;z-index:300;background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,.5);min-width:280px;user-select:none}
.cdp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cdp-title{font-size:13px;font-weight:600;color:var(--t1)}
.cdp-nav{display:flex;gap:6px}
.cdp-nav button{background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--t2);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.cdp-nav button:hover{background:var(--s3);color:var(--t1)}
.cdp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cdp-dow{font-size:10px;color:var(--t3);font-family:var(--fm);padding:4px 0;font-weight:600;text-transform:uppercase}
.cdp-day{padding:6px 0;font-size:12px;border-radius:6px;cursor:pointer;color:var(--t2);transition:all .12s;font-family:var(--fm)}
.cdp-day:hover{background:var(--s3);color:var(--t1)}
.cdp-day.other{color:var(--t3);opacity:.4}
.cdp-day.today{border:1px solid var(--ac);color:var(--ac)}
.cdp-day.sel{background:var(--ac);color:#000;font-weight:600}
.cdp-foot{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)}

.cdp-foot .cdp-clear{color:var(--t3)}.cdp-foot .cdp-clear:hover{color:var(--rd)}
.cdp-foot .cdp-today{color:var(--ac)}.cdp-foot .cdp-today:hover{background:var(--acd)}

.cdp-trigger:hover{color:var(--t1);border-color:var(--b2)}

<body>
<div class="app">
<aside class="sb">
  <div class="logo"><div class="lm">FT</div><div><div class="lt">FinTrack</div><div class="ls">ОБЛІК</div></div></div>
  <nav class="nav">
    <div class="ns">Навігація</div>
    <div class="ni a" onclick="sv('dash')" id="nav-dash">📊 Огляд</div>
    <div class="ni" onclick="sv('sites')" id="nav-sites">🌐 Сайти <span class="bx" id="nb-sites">0</span></div>
    <div class="ni" onclick="sv('tx')" id="nav-tx">💰 Транзакції <span class="bx" id="nb-tx">0</span></div>
    <div class="ni" onclick="sv('analytics')" id="nav-analytics">📈 Аналітика</div>
    <div class="ni" onclick="sv('settings')" id="nav-settings">⚙️ Налаштування</div>
    <div class="ni" onclick="sv('import')" id="nav-import">📥 Імпорт</div>
  </nav>
  <div id="user-section" style="padding:12px 10px;border-top:1px solid var(--b1);margin-top:auto"></div>
</aside>
<div class="main">
  <div class="tb"><div class="tbt" id="page-title">Огляд</div>
    <div class="tb-actions" id="tb-actions" style="display:none">
      <button class="btn bp" onclick="showAddTx('income')" style="border-radius:20px">+ Дохід</button>
      <button class="btn brd" onclick="showAddTx('expense')" style="border-radius:20px">− Витрата</button>
    </div>
  </div>
  <div class="cnt" id="content"></div>
</div>
</div>
<div id="modal-root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const TEAMS=['Fortuna','Phoenix','Baza','Brand','Review'];
const CATS=['Hybrid','RevShare','CPA','Content','Domain','Links','Host','Flat','Bonus','Services','Other'];
const TC={Fortuna:'tF',Phoenix:'tP',Baza:'tB',Brand:'tBr',Review:'tR'};

function today(){return new Date().toISOString().slice(0,10);}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function periodDates(k){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth();
  if(k==='cur'){const ms=String(m+1).padStart(2,'0');return{from:`${y}-${ms}-01`,to:`${y}-${ms}-31`};}
  if(k==='prev'){const py=m===0?y-1:y,pm=m===0?12:m;const ms=String(pm).padStart(2,'0');return{from:`${py}-${ms}-01`,to:`${py}-${ms}-31`};}
  if(k==='year'){return{from:`${y}-01-01`,to:`${y}-12-31`};}
  return{from:'',to:''};
}
function inP(date,from,to){if(!date)return false;return(!from||date>=from)&&(!to||date<=to);}

function genDemo(){
  const sl=[{h:'Revo',n:'Revo'},{h:'qryxqq',n:'Чистіков Вадім'},{h:'nikita8008',n:'Ряничев Микита'},
    {h:'Hellbrod',n:'Hellbrod'},{h:'kirseo',n:'Артеменко Кирило'},{h:'petro_seo',n:'Кушнір Петро'},
    {h:'Muller',n:'Muller'},{h:'Axel',n:'Axel'},{h:'dhryhorenko',n:'Григоренко Денис'}];
  const doms=['big-bonanza.com','ampmcasino.com.pl','betclass-italia.it','bazacasino.it','betsatapk.de',
    'casinocat.pl','casinolo-eu.com','chickenroadpromocode.com','chickenroadslot.com.pl',
    'fatbankeronline.com','fortunaslot.pl','futuraride.com','galavanson.com','gatesofolympus.com.pl',
    'inguma.org','jackpot-bells.com.pl','kingchancefr.com','luckypharaohonline.de','malinacasinofi.com',
    'megajoker.no','nvcasinoapp.com','phoenixcasino.de','rainbetplay.com','razorsharkcasino.de',
    'royaljokercasino.com','sweetbonanza-casino.net','vinylcasinoapp.com','reviewsite.org'];
  const sites={};
  doms.forEach((d,i)=>{sites[d]={team:TEAMS[i%TEAMS.length],seo:sl[i%sl.length].h,seoName:sl[i%sl.length].n};});
  const seos={};
  sl.forEach((s,i)=>seos[s.h]={name:s.n,team:TEAMS[i%TEAMS.length]});
  const txs=[];const now=new Date();
  for(let i=0;i<700;i++){
    const d=new Date(now);d.setDate(d.getDate()-Math.floor(Math.random()*400));
    const dom=doms[Math.floor(Math.random()*doms.length)];
    const se=sl[Math.floor(Math.random()*sl.length)];
    const neg=Math.random()<0.3;
    const amt=Math.round((Math.random()*800+50)*100)/100*(neg?-1:1);
    const iC=['Hybrid','RevShare','CPA','Flat','Bonus'],eC=['Domain','Links','Host','Content','Services','Other'];
    const cat=neg?eC[Math.floor(Math.random()*eC.length)]:iC[Math.floor(Math.random()*iC.length)];
    txs.push({id:i,date:d.toISOString().slice(0,10),amount:amt,site:dom,team:sites[dom].team,
      category:cat,seo:se.h,seoName:se.n,fired:false,comment:null,deleted:false});
  }
  for(let i=0;i<8;i++){
    const d=new Date(now);d.setDate(d.getDate()-Math.floor(Math.random()*30));
    const dom=doms[Math.floor(Math.random()*doms.length)];
    const se=sl[Math.floor(Math.random()*sl.length)];
    const neg=Math.random()<0.4;
    const amt=Math.round((Math.random()*500+50)*100)/100*(neg?-1:1);
    txs.push({id:700+i,date:d.toISOString().slice(0,10),amount:amt,site:dom,team:sites[dom].team,
      category:CATS[Math.floor(Math.random()*CATS.length)],seo:se.h,seoName:se.n,fired:false,comment:null,deleted:true});
  }
  return{sites,seos,transactions:txs};
}

function pA(v){if(!v)return{team:null,site:null};const m=v.match(/^\(([^)]+)\)\s*(.+)/);return m?{team:m[1].trim(),site:m[2].trim()}:{team:null,site:v.trim()};}
function pT(v){if(!v||v==='No Tag')return{handle:null,name:null,fired:false};
  const fired=v.includes('Звільнен');
  const hm=v.match(/@(\S+)/),nm=v.match(/\(([^)]+)\)/);
  return{handle:hm?hm[1]:null,name:nm?nm[1]:(hm?hm[1]:null),fired,raw:v};
}
function parseFmDate(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v.toISOString().slice(0,10);
  const s=String(v);
  // "dd.MM.yyyy HH:mm:ss" format
  const m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m)return`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  const d=new Date(s);return isNaN(d)?null:d.toISOString().slice(0,10);
}
function parseFmDateTime(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v.toISOString();
  return String(v);
}
// Finmap split-row детектор:
// рядок-частина має дату=null, суму!=null, команду!=null, обидва рахунки=null, категорію=null
function _isFinmapSplit(row){
  return !row['Дата платежу'] && !row['Дата нарахування']
      && (row['Сума в валюті компанії']!=null && row['Сума в валюті компанії']!=='')
      && (row['Проект']!=null && String(row['Проект']).trim()!=='')
      && !row['З рахунку'] && !row['На рахунок']
      && (row['Категорія']==null || String(row['Категорія']).trim()==='');
}

// Map a single row → транзакція; повертає null, якщо не вдалось (немає дати чи суми)
function _mapFinmapRow(row, idForTx){
  const fr=pA(row['З рахунку']),to=pA(row['На рахунок']),tag=pT(row['Теги']);
  const site=to.site||fr.site,team=to.team||fr.team||row['Проект']||null;
  const isExpense=!!fr.site&&!to.site;
  const isIncome =!!to.site&&!fr.site;
  const amt=parseFloat(row['Сума в валюті компанії'])||0;
  const cat=row['Категорія']||null;
  // знак: за напрямом рахунку; якщо обидва порожні — за категорією
  const incomeCats=['CPA','RevShare','Bonus','Hybrid','Flat','Категорії доходу'];
  let sign;
  if(isIncome) sign=+1;
  else if(isExpense) sign=-1;
  else sign=incomeCats.includes(cat)?+1:-1;
  const amount=sign*Math.abs(amt);
  const date=parseFmDate(row['Дата платежу'])||parseFmDate(row['Дата нарахування']);
  if(!date||!amt) return null;
  return{
    id:idForTx,
    date,
    amount,
    amtAccount:parseFloat(row['Сума в валюті рахунка'])||amt,
    site,team,
    category:(cat==='Категорії витрат'||cat==='Категорії доходу')?null:cat,
    subcategory:row['Підкатегорія']||null,
    seo:tag.handle,seoName:tag.name,fired:tag.fired,
    project:row['Проект']||null,
    subproject:row['Підпроект']||null,
    contractor:row['Контрагент']||null,
    subcontractor:row['Підконтрагент']||null,
    tags:row['Теги']||null,
    comment:row['Коментар']||null,
    datePayment:parseFmDateTime(row['Дата платежу']),
    dateAccrual:parseFmDateTime(row['Дата нарахування']),
    periodFrom:parseFmDate(row['Період нарахування (дата "з")']),
    periodTo:parseFmDate(row['Період нарахування (дата "по")']),
    fromAccount:row['З рахунку']||null,
    toAccount:row['На рахунок']||null,
    deleted:false
  };
}

function importRows(rows){
  const sites={},seos={},txs=[],teamsSet=new Set(),catsIncome=new Set(),catsExpense=new Set();
  let splitGroups=0,splitTxs=0;

  // ── Передпрохід: сайти, які зустрічаються у ≥2 командах ──
  // ── або не виглядають як домен (немає точки) — отримують ──
  // ── суфікс команди в ключі: "Архів" → "Архів (Baza)", щоб ──
  // ── не зливались у один запис.
  const _siteTeams=new Map(); // raw site → Set of teams
  for(const row of rows){
    const fr=pA(row['З рахунку']),to=pA(row['На рахунок']);
    for(const x of [fr,to]){
      if(!x.site||!x.team)continue;
      const k=x.site;
      if(!_siteTeams.has(k))_siteTeams.set(k,new Set());
      _siteTeams.get(k).add(x.team);
    }
  }
  function uniqSiteKey(site,team){
    if(!site)return site;
    const looksDomain=/\./.test(site);
    const teams=_siteTeams.get(site);
    const ambiguous=(teams&&teams.size>1)||!looksDomain;
    if(ambiguous&&team) return `${site} (${team})`;
    return site;
  }

  // ── Канонікалізація імен (case-insensitive merge) ─────────
  // Для команд/категорій/SEO: existing DB.teams і first-encountered
  // варіант стають канонічними. Усе інше зводиться до них.
  const canonTeams=new Map();
  (DB.teams||[]).forEach(t=>{if(t&&!canonTeams.has(String(t).toLowerCase()))canonTeams.set(String(t).toLowerCase(),t);});
  const canonCats=new Map();
  [...(DB.catIncome||[]),...(DB.catExpense||[])].forEach(c=>{if(c&&!canonCats.has(String(c).toLowerCase()))canonCats.set(String(c).toLowerCase(),c);});
  const canonSeos=new Map();
  Object.keys(DB.seos||{}).forEach(h=>{if(h&&!canonSeos.has(String(h).toLowerCase()))canonSeos.set(String(h).toLowerCase(),h);});

  function normTeam(t){if(!t)return t;const s=String(t).trim();if(!s)return'';const k=s.toLowerCase();if(!canonTeams.has(k))canonTeams.set(k,s);return canonTeams.get(k);}
  function normCat(c){if(!c)return c;const s=String(c).trim();if(!s)return'';const k=s.toLowerCase();if(!canonCats.has(k))canonCats.set(k,s);return canonCats.get(k);}
  function normSeo(h){if(!h)return h;const s=String(h).trim();if(!s)return'';const k=s.toLowerCase();if(!canonSeos.has(k))canonSeos.set(k,s);return canonSeos.get(k);}
  function applyCanon(tx){if(!tx)return tx;tx.team=normTeam(tx.team);tx.category=normCat(tx.category);tx.seo=normSeo(tx.seo);tx.site=uniqSiteKey(tx.site,tx.team);return tx;}

  // Перший прохід: групуємо рядки на (parent, splits[])
  const groups=[];
  for(const row of rows){
    if(_isFinmapSplit(row)){
      if(groups.length) groups[groups.length-1].splits.push(row);
      // якщо нема parent — orphan, ігноруємо
    } else {
      groups.push({parent:row,splits:[]});
    }
  }

  // Помічник для збору сутностей з транзакції
  function collect(tx, isExp){
    if(tx.team) teamsSet.add(tx.team);
    if(tx.category){
      if(isExp) catsExpense.add(tx.category); else catsIncome.add(tx.category);
    }
    if(tx.site && tx.team && !sites[tx.site]) sites[tx.site]={team:tx.team,seo:tx.seo,seoName:tx.seoName};
    if(tx.seo && !seos[tx.seo]) seos[tx.seo]={name:tx.seoName||tx.seo,team:tx.team};
  }

  for(const g of groups){
    const parentTx=applyCanon(_mapFinmapRow(g.parent, txs.length));
    if(g.splits.length===0){
      if(parentTx){
        txs.push(parentTx);
        collect(parentTx, parentTx.amount<0);
      }
      continue;
    }
    // Маємо splits: parent розгортаємо у N окремих транзакцій
    if(!parentTx) continue; // parent без дати/суми — пропускаємо групу повністю
    splitGroups++;
    // знак успадковуємо від parent
    const sign = parentTx.amount<0 ? -1 : (parentTx.amount>0 ? +1 : 1);
    for(const s of g.splits){
      const splitTeam=normTeam(String(s['Проект']||'').trim());
      const splitAmt=Math.abs(parseFloat(s['Сума в валюті компанії'])||0);
      if(!splitAmt) continue;
      const tx={
        ...parentTx,
        id:txs.length,
        team:splitTeam,
        amount:sign*splitAmt,
        amtAccount:splitAmt,
        comment:(parentTx.comment?parentTx.comment+' · ':'')+'split→'+splitTeam,
        splitOf:parentTx.date+'|'+parentTx.amount+'|'+(parentTx.site||'')+'|'+(parentTx.comment||'')
      };
      txs.push(tx);
      collect(tx, tx.amount<0);
      splitTxs++;
    }
  }
  const teams=[...teamsSet].filter(t=>t!=='Архів Slot'&&t!=='Дівіденди');
  return{sites,seos,transactions:txs,teams,catIncome:[...catsIncome].sort(),catExpense:[...catsExpense].sort(),splitGroups,splitTxs};
}

// ── Case-insensitive dedupe для existing DB ────────────────
// Після кожного імпорту: видаляє дублікати на кшталт ["Fortuna", "fortuna"]
// → залишає тільки "Fortuna" (першу зустрінуту), і переписує всі transactions/sites
// щоб посилались на канонічну назву.
function normalizeDBCase(){
  if(!DB||!DB.teams)return;
  const canonTeams=new Map();
  DB.teams.forEach(t=>{if(!t)return;const k=String(t).toLowerCase();if(!canonTeams.has(k))canonTeams.set(k,t);});
  DB.teams=[...new Set([...canonTeams.values()])];

  const canonCats=new Map();
  [...(DB.catIncome||[]),...(DB.catExpense||[])].forEach(c=>{if(!c)return;const k=String(c).toLowerCase();if(!canonCats.has(k))canonCats.set(k,c);});
  if(DB.catIncome)DB.catIncome=[...new Set(DB.catIncome.map(c=>canonCats.get(String(c).toLowerCase())||c))];
  if(DB.catExpense)DB.catExpense=[...new Set(DB.catExpense.map(c=>canonCats.get(String(c).toLowerCase())||c))];

  const canonSeos=new Map();
  Object.keys(DB.seos||{}).forEach(h=>{if(!h)return;const k=h.toLowerCase();if(!canonSeos.has(k))canonSeos.set(k,h);});

  // Переписуємо team у транзакціях
  (DB.transactions||[]).forEach(t=>{
    if(t.team){const k=String(t.team).toLowerCase();if(canonTeams.has(k))t.team=canonTeams.get(k);}
    if(t.category){const k=String(t.category).toLowerCase();if(canonCats.has(k))t.category=canonCats.get(k);}
    if(t.seo){const k=String(t.seo).toLowerCase();if(canonSeos.has(k))t.seo=canonSeos.get(k);}
  });
  // Переписуємо team/seo у сайтах
  Object.keys(DB.sites||{}).forEach(d=>{
    const s=DB.sites[d];
    if(s.team){const k=String(s.team).toLowerCase();if(canonTeams.has(k))s.team=canonTeams.get(k);}
    if(s.seo){const k=String(s.seo).toLowerCase();if(canonSeos.has(k))s.seo=canonSeos.get(k);}
  });
  // Збираємо дублі в DB.seos: переносимо сайти з не-канонічних SEO до канонічних
  if(DB.seos){
    const newSeos={};
    for(const[h,info]of Object.entries(DB.seos)){
      const k=h.toLowerCase();
      const canonical=canonSeos.get(k)||h;
      if(!newSeos[canonical])newSeos[canonical]={...info};
    }
    DB.seos=newSeos;
  }
}

function applyUserFilter(data){
  const activeUser=getActiveUser();
  if(!activeUser||activeUser.role==='admin')return data;

  const filtered=data.filter(item=>{
    // Filter by teams
    if(activeUser.teams&&activeUser.teams.length>0&&!activeUser.teams.includes(item.team))return false;
    // Filter by categories (for transactions)
    if(activeUser.categories&&activeUser.categories.length>0&&item.category&&!activeUser.categories.includes(item.category))return false;
    // Filter by seos
    if(activeUser.seos&&activeUser.seos.length>0&&item.seo&&!activeUser.seos.includes(item.seo))return false;
    // Filter by sites
    if(activeUser.sites&&activeUser.sites.length>0&&item.site&&!activeUser.sites.includes(item.site))return false;
    return true;
  });
  return filtered;
}

// ── ANALYTICS (P&L) ──
function getAnalyticsData(from, to){
  const active=applyUserFilter(DB.transactions.filter(t=>!t.deleted));
  const filtered=active.filter(t=>{
    if(from&&t.date<from)return false;
    if(to&&t.date>to)return false;
    return true;
  });
  const byTeam={};
  const bySeo={};
  const bySite={};
  const byCat={income:{},expense:{}};

  for(const t of filtered){
    const team=t.team||'Unknown';
    const seo=t.seo||'Unknown';
    const site=t.site||'Unknown';
    const cat=t.category||'Other';
    const isIncome=t.amount>=0;

    if(!byTeam[team])byTeam[team]={income:0,expense:0,sites:{},seos:{}};
    if(!bySeo[seo])bySeo[seo]={income:0,expense:0,sites:{},team};
    if(!bySite[site])bySite[site]={income:0,expense:0,team,seo};

    if(isIncome){
      byTeam[team].income+=t.amount;
      bySeo[seo].income+=t.amount;
      bySite[site].income+=t.amount;
      if(!byCat.income[cat])byCat.income[cat]=0;
      byCat.income[cat]+=t.amount;
    } else {
      byTeam[team].expense+=t.amount;
      bySeo[seo].expense+=t.amount;
      bySite[site].expense+=t.amount;
      if(!byCat.expense[cat])byCat.expense[cat]=0;
      byCat.expense[cat]+=t.amount;
    }

    if(!byTeam[team].seos[seo])byTeam[team].seos[seo]={income:0,expense:0,sites:new Set()};
    byTeam[team].seos[seo].income+=(isIncome?t.amount:0);
    byTeam[team].seos[seo].expense+=(isIncome?0:t.amount);
    byTeam[team].seos[seo].sites.add(site);

    if(!byTeam[team].sites)byTeam[team].sites={};
    if(!byTeam[team].sites[site])byTeam[team].sites[site]={income:0,expense:0};
    byTeam[team].sites[site].income+=(isIncome?t.amount:0);
    byTeam[team].sites[site].expense+=(isIncome?0:t.amount);

    if(!bySeo[seo].sites[site])bySeo[seo].sites[site]={income:0,expense:0};
    bySeo[seo].sites[site].income+=(isIncome?t.amount:0);
    bySeo[seo].sites[site].expense+=(isIncome?0:t.amount);
    bySite[site].seo=seo;
  }

  let totalIncome=0,totalExpense=0;
  for(const t of filtered){
    if(t.amount>=0)totalIncome+=t.amount;
    else totalExpense+=t.amount;
  }

  const topSites=Object.entries(bySite).map(([site,data])=>{
    const profit=data.income+data.expense;
    return{site,team:data.team,seo:data.seo,income:data.income,expense:data.expense,profit};
  }).sort((a,b)=>b.profit-a.profit).slice(0,5);

  const topSeo=Object.entries(bySeo).map(([seoH,data])=>{
    const profit=data.income+data.expense;
    const sitesCount=Object.keys(data.sites).length;
    return{seo:seoH,team:data.team,sitesCount,income:data.income,expense:data.expense,profit};
  }).sort((a,b)=>b.profit-a.profit).slice(0,5);

  return{
    total:{income:totalIncome,expense:totalExpense,profit:totalIncome+totalExpense},
    byTeam,bySeo,bySite,topSites,topSeo,byCat
  };
}

function applyBulkExpTx(type){

function getF(d){return expandedSites.get(d)||{period:'all',cat:'',type:'',from:'',to:''};}
function filtTx(txs,f){
  let from=f.from,to=f.to;
  if(f.period!=='custom'){const pd=periodDates(f.period==='all'?'':f.period);from=pd.from;to=pd.to;}
  return txs.filter(t=>{
    if(t.deleted)return false;
    if(f.type==='income'&&t.amount<0)return false;
    if(f.type==='expense'&&t.amount>=0)return false;
    if(f.cat&&t.category!==f.cat)return false;
    if(from&&t.date<from)return false;
    if(to&&t.date>to)return false;
    return true;
  }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
}

  const eC=new Set(allTx.filter(t=>t.amount<0&&t.category).map(t=>t.category));
  const allCats=[...new Set(allTx.map(t=>t.category).filter(Boolean))].sort();

    <div class="exp-cats"><span style="font-size:11px;color:var(--t3);margin-right:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Кат:</span>
      <button class="cat-btn ${!f.cat?'a':''}" onclick="setF('${d}','cat','')">Всі</button>
      ${allCats.map(c=>`<button class="cat-btn ${f.cat===c?'a':''} ${!avail.has(c)?'dis':''}" onclick="${avail.has(c)?`setF('${d}','cat','${esc(c)}')`:''}"">${c}</button>`).join('')}
    </div>
    <div class="exp-sum">
      <span style="color:var(--t3);font-size:13px">${filt.length} з ${allTx.length}</span><span style="color:var(--t3)">·</span>
      <span>Баланс: <strong>${bH(bal)}</strong></span>
      <span style="color:var(--t3);font-size:12px">↑ <span style="color:var(--ac)">$${inc.toFixed(2)}</span></span>
      ${exp<0?`<span style="color:var(--t3);font-size:12px">↓ <span style="color:var(--rd)">$${Math.abs(exp).toFixed(2)}</span></span>`:''}
    </div>
    ${(()=>{const selCount=filt.filter(t=>selExpTx.has(t.id)).length;return selCount>0?`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--acd);border-bottom:1px solid var(--b2)"><span style="color:var(--ac);font-family:var(--fm);font-weight:600">${selCount}</span><span style="color:var(--t2);font-size:13px">вибрано</span><button class="btn bg bs" onclick="showBulkExpTx('team')">↔ Команду</button><button class="btn bg bs" onclick="showBulkExpTx('seo')">👤 SEO</button><button class="btn bg bs" style="margin-left:auto" onclick="selExpTx=new Set();renderSites()">Зняти</button></div>`:''})()}
    <table class="exp-tbl"><thead><tr>
      <th style="padding:8px 16px;font-size:10px;width:30px">${chk(filt.length>0&&filt.every(t=>selExpTx.has(t.id)),"event.stopPropagation();toggleAllExpTx('"+d+"')")}</th>
      <th style="padding:8px 16px;font-size:10px">Дата</th><th style="padding:8px 16px;font-size:10px">Команда</th><th style="padding:8px 16px;font-size:10px">Тип</th>
      <th style="padding:8px 16px;font-size:10px">Категорія</th><th style="padding:8px 16px;font-size:10px">SEO</th>

      <th style="padding:8px 16px;font-size:10px"></th>
    </tr></thead><tbody>
    ${filt.slice(0,60).map(t=>`<tr>
      <td onclick="event.stopPropagation()">${chk(selExpTx.has(t.id),"event.stopPropagation();toggleExpTx("+t.id+")")}</td>
      <td class="fm" style="color:var(--t3);white-space:nowrap">${t.date||'—'}</td>
      <td>${tbadge(t.team)}</td>
      <td>${t.amount>=0?'<span class="ti">Дохід</span>':'<span class="to">Витрата</span>'}</td>
      <td>${cbadge(t.category)}</td><td style="color:var(--t2)">${t.seoName||t.seo||'—'}</td>
      <td style="color:var(--t3);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.comment||'—'}</td>
      <td style="text-align:right">${txAmtDisplay(t)}</td>
      <td><div style="display:flex;gap:4px"><button class="btn bg bs" onclick="showEditTx(${t.id})" style="padding:3px 7px;font-size:11px">✎</button><button class="btn brd bs" onclick="confirmDeleteTx(${t.id})" style="padding:3px 7px;font-size:11px">🗑</button></div></td>
    </tr>`).join('')}
    ${filt.length===0?`<tr><td colspan="9" style="padding:20px 16px;color:var(--t3);text-align:center">Немає транзакцій</td></tr>`:''}
    </tbody></table>
  </div></td></tr>`;
}

function setF(domain,key,val){
  const f=getF(domain);f[key]=val;
  if(key==='type'){
    const allTx=DB.transactions.filter(t=>t.site===domain&&!t.deleted);
    const av=val==='income'?new Set(allTx.filter(t=>t.amount>=0&&t.category).map(t=>t.category))
      :val==='expense'?new Set(allTx.filter(t=>t.amount<0&&t.category).map(t=>t.category))
      :new Set(allTx.map(t=>t.category).filter(Boolean));
    if(f.cat&&!av.has(f.cat))f.cat='';
  }
  expandedSites.set(domain,f);renderSites();
  if(key==='period'&&val==='custom'){
    if(!f.from){setTimeout(()=>{const el=document.querySelector('.exp-daterow .cdp-trigger');if(el)el.click();},100);}
  }
}

// ── SEARCHABLE SITE DROPDOWN ──
function buildSiteDropdown(selectedSite){
  // Include "Без Сайту" as first option
  const allSites=['Без Сайту',...Object.keys(DB.sites).sort()];
  return`<div style="position:relative" id="site-dd-wrap">
    <input class="inp" id="et-site" placeholder="Пошук сайту..." value="${selectedSite||''}" autocomplete="off"
      oninput="filterSiteDd(this.value)" onfocus="filterSiteDd(this.value)" onblur="setTimeout(()=>hideSiteDd(),200)" style="width:100%">
    <div id="site-dd-list" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--s2);border:1px solid var(--b2);border-radius:7px;max-height:180px;overflow-y:auto;z-index:200;margin-top:2px"></div>
  </div>`;
}
function filterSiteDd(q){
  const list=document.getElementById('site-dd-list');if(!list)return;
  const allSites=['Без Сайту',...Object.keys(DB.sites).sort()];
  const matches=q?allSites.filter(s=>s.toLowerCase().includes(q.toLowerCase())):allSites;
  list.style.display=matches.length?'block':'none';
  list.innerHTML=matches.slice(0,30).map(s=>`<div onclick="pickSite('${esc(s)}')" style="padding:8px 12px;cursor:pointer;font-size:13px;font-family:var(--fm);color:var(--t1)" onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background=''">${s}</div>`).join('');
}
function hideSiteDd(){const l=document.getElementById('site-dd-list');if(l)l.style.display='none';}
function pickSite(s){
  const inp=document.getElementById('et-site');if(inp)inp.value=s;
  hideSiteDd();
  // 9) Auto-fill team from site; "Без Сайту" clears team lock
  if(s==='Без Сайту'){
    // unlock team selector
    const tw=document.getElementById('team-split-wrap');
    if(tw){const sel=document.getElementById('et-team');if(sel)sel.disabled=false;}
    return;
  }
  const si=DB.sites[s];
  if(si&&si.team){
    // auto-set team and lock if not split mode
    if(!txTeamSplit.enabled){
      const tw=document.getElementById('team-split-wrap');
      if(tw){
        // re-render with pre-selected team
        const prevEnabled=txTeamSplit.enabled;
        txTeamSplit.enabled=false;
        renderTeamSplit();
        const sel=document.getElementById('et-team');
        if(sel){sel.value=si.team;sel.disabled=true;}
      }
    }
    // also update SEO list for this team
    updateSeoByTeam(si.team);
  }
}
// 2) Filter SEO dropdown by selected team(s)
function updateSeoByTeam(team){
  const sel=document.getElementById('et-seo');if(!sel)return;
  const prev=sel.value;
  let teams=[];
  if(txTeamSplit.enabled){
    teams=getTeams().filter(t=>txTeamSplit.teams[t]?.sel);
  } else if(team){
    teams=[team];
  }
  const filtered=teams.length>0
    ?Object.entries(DB.seos).filter(([h,s])=>teams.includes(s.team)||!s.team||s.team==='')
    :Object.entries(DB.seos);
  sel.innerHTML=`<option value="">— Виберіть —</option>`+filtered.map(([h,s])=>`<option value="${h}" ${prev===h?'selected':''}>@${h}${s.name?' — '+s.name:''}</option>`).join('');
}

function initTeamSplit(currentTeam){
  txTeamSplit={enabled:false,teams:{}};
  getTeams().forEach(t=>txTeamSplit.teams[t]={sel:t===currentTeam,pct:0});
}
function renderTeamSplit(){
  const el=document.getElementById('team-split-wrap');if(!el)return;
  const teams=getTeams().slice().sort();
  if(!txTeamSplit.enabled){
    el.innerHTML=`<div class="fr"><div class="fl">Команда</div><select class="inp" id="et-team" onchange="onTeamChange(this.value)"><option value="">—</option>${teams.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
    <div style="margin-bottom:14px"><button class="btn bg bs" style="font-size:12px" onclick="enableTeamSplit()">⊕ Розподілити між командами</button></div>`;
    return;
  }
  const selTeams=teams.filter(t=>txTeamSplit.teams[t]?.sel);
  const totalPct=selTeams.reduce((s,t)=>s+(parseFloat(txTeamSplit.teams[t]?.pct)||0),0);
  const focusId=txTeamSplit._focusId||null;
  el.innerHTML=`<div class="fr" style="margin-bottom:6px"><div class="fl">Команди (мультивибір)</div></div>
  ${teams.map(t=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <div class="cb ${txTeamSplit.teams[t]?.sel?'c':''}" onclick="toggleSplitTeam('${t}')">${txTeamSplit.teams[t]?.sel?'✓':''}</div>
    <span style="font-size:13px;min-width:80px">${t}</span>
    ${txTeamSplit.teams[t]?.sel?`<input class="inp inp-sm" type="number" min="0" max="100" step="1" id="pct-${t}" value="${txTeamSplit.teams[t].pct||''}" placeholder="%" oninput="setSplitPct('${t}',this)" style="width:70px"> %`:''}
  </div>`).join('')}
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn bg bs" style="font-size:12px" onclick="distributeEvenly()">↔ Рівномірно розподілити</button>
    <span id="split-pct-counter" style="font-size:12px;color:${Math.abs(totalPct-100)<0.01?'var(--ac)':totalPct>100?'var(--rd)':'var(--t3)'}">${totalPct.toFixed(0)}% / 100%</span>
    <button class="btn bg bs" style="font-size:12px;margin-left:auto" onclick="disableTeamSplit()">✕ Скасувати</button>
  </div>`;
  if(focusId){
    const inp=document.getElementById(focusId);
    if(inp){inp.focus();const l=inp.value.length;inp.setSelectionRange(l,l);}
    txTeamSplit._focusId=null;
  }
  if(txSeoSplit.enabled)renderSeoSplitUI();
}
function onTeamChange(team){
  updateSeoByTeam(team);
  // unlock team field (site selection may have locked it)
  const sel=document.getElementById('et-team');if(sel)sel.disabled=false;
}
function setSplitPct(t,inp){
  const teams=getTeams();
  let v=parseFloat(inp.value)||0;
  const others=teams.filter(x=>x!==t&&txTeamSplit.teams[x]?.sel).reduce((s,x)=>s+(parseFloat(txTeamSplit.teams[x]?.pct)||0),0);
  const maxAllowed=100-others;
  if(v>maxAllowed){v=maxAllowed;inp.value=v;}
  txTeamSplit.teams[t].pct=v;
  // Update only the percentage counter without full re-render
  const selTeams=teams.filter(x=>txTeamSplit.teams[x]?.sel);
  const totalPct=selTeams.reduce((s,x)=>s+(parseFloat(txTeamSplit.teams[x]?.pct)||0),0);
  const counter=document.getElementById('split-pct-counter');
  if(counter){
    counter.style.color=Math.abs(totalPct-100)<0.01?'var(--ac)':totalPct>100?'var(--rd)':'var(--t3)';
    counter.textContent=totalPct.toFixed(0)+'% / 100%';
  }
  if(txSeoSplit.enabled)renderSeoSplitUI();
}

let txTeamSplit={enabled:false,teams:{}};
let txSeoSplit={enabled:false,seos:{}};
function enableSeoSplit(){
  txSeoSplit.enabled=true;
  txSeoSplit.seos={};
  // Pre-select SEOs from selected teams
  const selTeams=getTeams().filter(t=>txTeamSplit.teams[t]?.sel);
  const team=!txTeamSplit.enabled?document.getElementById('et-team')?.value:'';
  const teams=selTeams.length>0?selTeams:(team?[team]:[]);
  teams.forEach(tt=>{
    Object.entries(DB.seos).filter(([h,s])=>s.team===tt).forEach(([h])=>{txSeoSplit.seos[h]=true;});
  });
  renderSeoSplitUI();
}
function disableSeoSplit(){txSeoSplit.enabled=false;txSeoSplit.seos={};const el=document.getElementById('seo-split-wrap');if(el)el.innerHTML='';}
function toggleSeoSplitItem(h){txSeoSplit.seos[h]=!txSeoSplit.seos[h];renderSeoSplitUI();}
function renderSeoSplitUI(){
  const el=document.getElementById('seo-split-wrap');if(!el)return;
  if(!txSeoSplit.enabled){el.innerHTML='';return;}
  const amt=parseFloat(document.getElementById('et-amt')?.value)||0;
  // Get available SEOs based on selected teams
  const selTeams=getTeams().filter(t=>txTeamSplit.teams[t]?.sel);
  const team=!txTeamSplit.enabled?document.getElementById('et-team')?.value:'';
  const teams=selTeams.length>0?selTeams:(team?[team]:[]);
  let availSeos=[];
  if(teams.length>0){
    teams.forEach(tt=>{
      Object.entries(DB.seos).filter(([h,s])=>s.team===tt).forEach(([h,s])=>{availSeos.push({h,team:tt,name:s.name||h});});
    });
  } else {
    Object.entries(DB.seos).forEach(([h,s])=>{availSeos.push({h,team:s.team,name:s.name||h});});
  }
  const selSeos=availSeos.filter(s=>txSeoSplit.seos[s.h]);
  const totalSel=selSeos.length;
  // Calculate amounts per team then per seo
  let listHtml='';
  if(txTeamSplit.enabled&&selTeams.length>0){
    selTeams.forEach(tt=>{
      const pct=(parseFloat(txTeamSplit.teams[tt]?.pct)||100)/100;
      const teamAmt=amt*pct;
      const teamSelSeos=selSeos.filter(s=>s.team===tt);
      if(teamSelSeos.length===0) return;
      const perSeo=teamAmt/teamSelSeos.length;
      teamSelSeos.forEach(s=>{
        listHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-bottom:1px solid var(--b1);font-size:12px">
          <span style="color:var(--t1)">@${s.h} <span style="color:var(--t3)">(${tt})</span></span>
          <span class="fm" style="color:var(--t2)">${getCurSym()}${Math.abs(perSeo).toFixed(2)}</span>
        </div>`;
      });
    });
  } else if(totalSel>0){
    const perSeo=amt/totalSel;
    selSeos.forEach(s=>{
      listHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-bottom:1px solid var(--b1);font-size:12px">
        <span style="color:var(--t1)">@${s.h} <span style="color:var(--t3)">(${s.team})</span></span>
        <span class="fm" style="color:var(--t2)">${getCurSym()}${Math.abs(perSeo).toFixed(2)}</span>
      </div>`;
    });
  }
  // Group SEOs by team for selection
  const teamGroups={};
  availSeos.forEach(s=>{if(!teamGroups[s.team])teamGroups[s.team]=[];teamGroups[s.team].push(s);});
  const groupedTeams=Object.keys(teamGroups).sort();
  let selectHtml='';
  groupedTeams.forEach(tt=>{
    const tSeos=teamGroups[tt];
    const allSel=tSeos.every(s=>txSeoSplit.seos[s.h]);
    const toggleAll=`(function(){const ss=[${tSeos.map(s=>"'"+s.h+"'").join(',')}];const allOn=${allSel};ss.forEach(function(h){txSeoSplit.seos[h]=!allOn});renderSeoSplitUI()})()`;
    selectHtml+=`<div style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer" onclick="${toggleAll}">
        ${tbadge(tt)}
        <span style="font-size:10px;color:var(--t3);font-family:var(--fm)">${tSeos.filter(s=>txSeoSplit.seos[s.h]).length}/${tSeos.length}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;padding-left:8px">
        ${tSeos.map(s=>`<div style="display:flex;align-items:center;gap:5px;cursor:pointer" onclick="toggleSeoSplitItem('${s.h}')">
          <div class="cb ${txSeoSplit.seos[s.h]?'c':''}" style="width:15px;height:15px;font-size:10px">${txSeoSplit.seos[s.h]?'✓':''}</div>
          <span style="font-size:11px;color:${txSeoSplit.seos[s.h]?'var(--t1)':'var(--t3)'};font-family:var(--fm)">@${s.h}</span>
        </div>`).join('')}
      </div>
    </div>`;
  });
  // Group distribution list by team too
  let distHtml='';
  if(totalSel>0){
    groupedTeams.forEach(tt=>{
      const teamSelSeos=selSeos.filter(s=>s.team===tt);
      if(teamSelSeos.length===0)return;
      let perSeo;
      if(txTeamSplit.enabled&&selTeams.length>0){
        const pct=(parseFloat(txTeamSplit.teams[tt]?.pct)||100)/100;
        perSeo=amt*pct/teamSelSeos.length;
      } else {
        perSeo=amt/totalSel;
      }
      distHtml+=`<div style="margin-bottom:2px;padding:4px 8px">${tbadge(tt)}</div>`;
      teamSelSeos.forEach(s=>{
        distHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px 4px 20px;border-bottom:1px solid var(--b1);font-size:12px">
          <span style="color:var(--t1);font-family:var(--fm)">@${s.h}</span>
          <span class="fm" style="color:var(--t2)">${getCurSym()}${Math.abs(perSeo).toFixed(2)}</span>
        </div>`;
      });
    });
  }
  el.innerHTML=`<div style="background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:12px;margin-bottom:14px">
    <div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-family:var(--fm);margin-bottom:10px">Оберіть SEO для розподілу</div>
    ${selectHtml}
    ${totalSel===0?'<div style="font-size:12px;color:var(--t3);padding:4px 0">Оберіть хоча б одного SEO</div>':''}
    ${distHtml?`<div style="border-top:1px solid var(--b1);padding-top:8px;margin-top:6px"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-family:var(--fm);margin-bottom:6px">Розподіл (${totalSel} SEO)</div>${distHtml}</div>`:''}
  </div>
  <div style="margin-bottom:14px"><button class="btn bg bs" style="font-size:12px" onclick="disableSeoSplit()">✕ Скасувати розподіл</button></div>`;
}
function getNextSplitGroup(){
  let max=0;DB.transactions.forEach(t=>{if(t.splitGroup&&t.splitGroup>max)max=t.splitGroup;});return max+1;
}
function enableTeamSplit(){
  txTeamSplit.enabled=true;
  const tm=document.getElementById('et-team');
  if(tm&&tm.value){txTeamSplit.teams[tm.value]={...(txTeamSplit.teams[tm.value]||{}),sel:true,pct:100};}
  renderTeamSplit();updateSeoByTeam();
}
function disableTeamSplit(){txTeamSplit.enabled=false;renderTeamSplit();updateSeoByTeam();}
function toggleSplitTeam(t){
  if(!txTeamSplit.teams[t])txTeamSplit.teams[t]={sel:false,pct:0};
  txTeamSplit.teams[t].sel=!txTeamSplit.teams[t].sel;
  if(!txTeamSplit.teams[t].sel)txTeamSplit.teams[t].pct=0;
  // Auto-set 100% if only one team selected
  const selTeams=getTeams().filter(x=>txTeamSplit.teams[x]?.sel);
  if(selTeams.length===1){txTeamSplit.teams[selTeams[0]].pct=100;}
  renderTeamSplit();
  updateSeoByTeam();
}
function distributeEvenly(){
  const sel=getTeams().filter(t=>txTeamSplit.teams[t]?.sel);if(!sel.length)return;
  const each=parseFloat((100/sel.length).toFixed(2));
  sel.forEach((t,i)=>txTeamSplit.teams[t].pct=i===sel.length-1?parseFloat((100-(each*(sel.length-1))).toFixed(2)):each);
  renderTeamSplit();
}
function showEditTx(id){
  const t=DB.transactions.find(x=>x.id===id);if(!t)return;
  const cats=[...new Set(DB.transactions.map(x=>x.category).filter(Boolean))].sort();
  initTeamSplit(t.team);
  showModal(`<div class="md" onclick="event.stopPropagation()">
    <div class="mdt">Редагувати транзакцію</div>

function saveEditTx(id){
  const t=DB.transactions.find(x=>x.id===id);if(!t)return;
  const seo=document.getElementById('et-seo').value;
  const amtRaw=parseFloat(document.getElementById('et-amt').value)||0;
  const selCur=document.getElementById('et-cur')?.value||'usd';
  let amt=amtRaw;
  if(selCur==='eur'){amt=parseFloat((amtRaw/getRate()).toFixed(2));}
  // preserve sign for edit
  if(t.amount<0&&amt>0)amt=-amt;
  const site=document.getElementById('et-site').value;
  const cat=document.getElementById('et-cat').value||null;
  const comm=document.getElementById('et-comm').value||null;
  const date=document.getElementById('et-date').value;
  if(txTeamSplit.enabled){
    const selTeams=getTeams().filter(t2=>txTeamSplit.teams[t2]?.sel);
    const totalPct=selTeams.reduce((s,t2)=>s+(parseFloat(txTeamSplit.teams[t2].pct)||0),0);
    if(selTeams.length>1&&Math.abs(totalPct-100)>0.1){alert('Сума відсотків повинна дорівнювати 100%');return;}
    // Remove old split group members if any
    if(t.splitGroup){
      DB.transactions=DB.transactions.filter(x=>x.splitGroup!==t.splitGroup||x.id===id);
    }
    const sg=selTeams.length>1||txSeoSplit.enabled?t.splitGroup||getNextSplitGroup():null;
    if(txSeoSplit.enabled){
      // distribute among selected SEOs per team
      const pickedSeos=Object.entries(txSeoSplit.seos).filter(([,v])=>v).map(([h])=>h);
      let isFirst=true;
      selTeams.forEach(tt=>{
        const pct=(parseFloat(txTeamSplit.teams[tt].pct)||100)/100;
        const teamAmt=amt*pct;
        const teamSeos=pickedSeos.filter(h=>DB.seos[h]?.team===tt);
        if(teamSeos.length===0)return;
        const perSeo=teamAmt/teamSeos.length;
        teamSeos.forEach(h=>{
          const sName=DB.seos[h]?.name||h;
          if(isFirst){t.date=date;t.amount=parseFloat(perSeo.toFixed(2));t.site=site;t.team=tt;t.category=cat;t.seo=h;t.seoName=sName;t.comment=comm;t.splitGroup=sg;t.origCur=selCur;isFirst=false;}
          else{const newId=DB.transactions.length?Math.max(...DB.transactions.map(x=>x.id))+1:1;DB.transactions.push({id:newId,date,amount:parseFloat(perSeo.toFixed(2)),site,team:tt,category:cat,seo:h,seoName:sName,fired:false,comment:comm,deleted:false,splitGroup:sg,origCur:selCur});}
        });
      });
    } else {
      const ft=selTeams[0]||'';
      t.date=date;t.amount=parseFloat((amt*((parseFloat(txTeamSplit.teams[ft]?.pct)||100)/100)).toFixed(2));
      t.site=site;t.team=ft;t.category=cat;t.seo=seo;t.seoName=DB.seos[seo]?.name||seo;t.comment=comm;t.splitGroup=sg;t.origCur=selCur;
      for(let i=1;i<selTeams.length;i++){
        const tt=selTeams[i];const pct=(parseFloat(txTeamSplit.teams[tt].pct)||0)/100;
        const newId=DB.transactions.length?Math.max(...DB.transactions.map(x=>x.id))+1:1;
        DB.transactions.push({id:newId,date,amount:parseFloat((amt*pct).toFixed(2)),site,team:tt,
          category:cat,seo,seoName:DB.seos[seo]?.name||seo,fired:false,comment:comm,deleted:false,splitGroup:sg,origCur:selCur});
      }
    }
  } else {
    const team=document.getElementById('et-team')?.value||t.team;
    t.date=date;t.amount=amt;t.site=site;t.team=team;t.category=cat;
    t.seo=seo;t.seoName=DB.seos[seo]?.name||seo;t.comment=comm;t.origCur=selCur;
  }
  txSeoSplit.enabled=false;
  saveDB();closeModal();render();
}

  deleteTx(id);

function addTxSave(txType){
  const isIncome=txType==='income';
  const isExpense=txType==='expense';
  const amtRaw=parseFloat(document.getElementById('et-amt').value);
  const site=document.getElementById('et-site').value.trim();
  const cat=document.getElementById('et-cat').value;
  const seo=document.getElementById('et-seo').value;
  const date=document.getElementById('et-date').value;
  const selCur=document.getElementById('et-cur')?.value||'usd';
  const errs=[];
  if(!date) errs.push('Дата');
  if(isNaN(amtRaw)||amtRaw===0) errs.push('Сума');
  if(!site) errs.push('Сайт');
  if(!cat) errs.push('Категорія');
  if(txSeoSplit.enabled){
    const selSeoCount=Object.values(txSeoSplit.seos).filter(Boolean).length;
    if(!selSeoCount) errs.push('SEO (оберіть хоча б одного)');
  } else {
    if(!seo) errs.push('SEO');
  }
  if(txTeamSplit.enabled){
    const selTeams=getTeams().filter(t=>txTeamSplit.teams[t]?.sel);
    if(!selTeams.length) errs.push('Команда');
  } else {
    const team=document.getElementById('et-team')?.value;
    if(!team) errs.push('Команда');
  }
  if(errs.length){alert('Заповніть обов\'язкові поля: '+errs.join(', '));return;}
  // Convert EUR to USD if needed
  let amt=Math.abs(amtRaw);
  if(selCur==='eur'){const rate=getRate();amt=parseFloat((amt/rate).toFixed(2));}
  if(isExpense) amt=-amt;
  else if(!isIncome) amt=amtRaw;
  const comm=document.getElementById('et-comm').value||null;
  const newId=DB.transactions.length?Math.max(...DB.transactions.map(x=>x.id))+1:1;
  if(txTeamSplit.enabled){
    const selTeams=getTeams().filter(t=>txTeamSplit.teams[t]?.sel);
    const totalPct=selTeams.reduce((s,t)=>s+(parseFloat(txTeamSplit.teams[t].pct)||0),0);
    if(selTeams.length>1&&Math.abs(totalPct-100)>0.1){alert('Сума відсотків повинна дорівнювати 100%');return;}
    let nextId=newId;
    const sg=selTeams.length>1||txSeoSplit.enabled?getNextSplitGroup():null;
    if(txSeoSplit.enabled){
      // distribute among selected SEOs per team
      const pickedSeos=Object.entries(txSeoSplit.seos).filter(([,v])=>v).map(([h])=>h);
      selTeams.forEach(tt=>{
        const pct=(parseFloat(txTeamSplit.teams[tt].pct)||100)/100;
        const teamAmt=amt*pct;
        const teamSeos=pickedSeos.filter(h=>DB.seos[h]?.team===tt);
        if(teamSeos.length===0)return;
        const perSeo=teamAmt/teamSeos.length;
        teamSeos.forEach(h=>{
          DB.transactions.push({id:nextId++,date,amount:parseFloat(perSeo.toFixed(2)),site,team:tt,
            category:cat,seo:h,seoName:DB.seos[h]?.name||h,fired:false,comment:comm,deleted:false,origCur:selCur,splitGroup:sg});
        });
      });
    } else {
      selTeams.forEach(tt=>{
        const pct=(parseFloat(txTeamSplit.teams[tt].pct)||100)/100;
        DB.transactions.push({id:nextId++,date,amount:parseFloat((amt*pct).toFixed(2)),site,team:tt,
          category:cat,seo,seoName:DB.seos[seo]?.name||seo,fired:false,comment:comm,deleted:false,origCur:selCur,splitGroup:sg});
      });
    }
  } else {
    const team=document.getElementById('et-team')?.value||'';
    if(txSeoSplit.enabled){
      const pickedSeos=Object.entries(txSeoSplit.seos).filter(([,v])=>v).map(([h])=>h);
      const sg=pickedSeos.length>1?getNextSplitGroup():null;
      let nextId2=newId;
      const perSeo=amt/pickedSeos.length;
      pickedSeos.forEach(h=>{
        DB.transactions.push({id:nextId2++,date,amount:parseFloat(perSeo.toFixed(2)),site,team,
          category:cat,seo:h,seoName:DB.seos[h]?.name||h,fired:false,comment:comm,deleted:false,origCur:selCur,splitGroup:sg});
      });
    } else {
      DB.transactions.push({id:newId,date,amount:amt,site,team,category:cat,seo,
        seoName:DB.seos[seo]?.name||seo,fired:false,comment:comm,deleted:false,origCur:selCur});
    }
  }
  txSeoSplit.enabled=false;
  saveDB();closeModal();render();ub();
}

function renderSites(){
  const{sites,seos}=DB;
  const teams=[...new Set(Object.values(sites).map(s=>s.team).filter(Boolean))].sort();
  const txBS={};
  for(const t of DB.transactions){if(!t.site||t.deleted)continue;if(!txBS[t.site])txBS[t.site]={cnt:0,bal:0};txBS[t.site].cnt++;txBS[t.site].bal+=t.amount;}
  const filtered=Object.entries(sites).filter(([d,i])=>{
    if(siteFilt.search&&!d.toLowerCase().includes(siteFilt.search.toLowerCase()))return false;
    if(siteFilt.team&&i.team!==siteFilt.team)return false;
    if(siteFilt.seo&&i.seo!==siteFilt.seo)return false;
    return true;
  }).sort((a,b)=>a[0].localeCompare(b[0]));
  const paginated=filtered.slice((sitePage-1)*PAGE,sitePage*PAGE);
  const allSel=paginated.length>0&&paginated.every(([d])=>selSites.has(d));
  let rowsHtml='';
  for(const [d,i] of paginated){
    const isExp=expandedSites.has(d);const info=txBS[d]||{cnt:0,bal:0};
    rowsHtml+=`<tr class="sr ${isExp?'exp':''}" onclick="toggleExp('${d}')">
      <td onclick="event.stopPropagation()">${chk(selSites.has(d),`event.stopPropagation();toggleSite('${d}')`)}</td>
      <td><span class="chevron ${isExp?'open':''}">▶</span><span class="fm" style="font-size:13px;color:var(--t1);font-weight:500">${d}</span></td>
      <td>${tbadge(i.team)}</td>
      <td>${i.seo?`<div style="font-size:13px;color:var(--t1)">${i.seoName||i.seo}</div><div style="font-size:11px;color:var(--t3);font-family:var(--fm)">@${i.seo}</div>`:'<span style="color:var(--t3)">—</span>'}</td>
      <td><span class="fm" style="font-size:12px;color:var(--t3)">${info.cnt} транз.</span></td>
      <td style="text-align:right">${bH(info.bal)}</td>
      <td><div style="display:flex;gap:4px"><button class="btn bg bs" onclick="event.stopPropagation();showEditSite('${d}')" style="padding:3px 8px;font-size:11px">✎</button><button class="btn brd bs" onclick="event.stopPropagation();deleteSite('${d}')" style="padding:3px 7px;font-size:11px">🗑</button></div></td>
    </tr>`;
    if(isExp)rowsHtml+=renderSiteExp(d);
  }
  document.getElementById('content').innerHTML=`
  <div class="fi">
    <input class="inp" placeholder="Пошук домену..." id="site-search-inp" value="${siteFilt.search}" oninput="siteFilt.search=this.value;sitePage=1;renderSitesKeepFocus()" style="width:220px">
    <select class="inp" onchange="siteFilt.team=this.value;sitePage=1;renderSites()"><option value="">Всі команди</option>${teams.map(t=>`<option ${siteFilt.team===t?'selected':''} value="${t}">${t}</option>`).join('')}</select>
    <select class="inp" onchange="siteFilt.seo=this.value;sitePage=1;renderSites()"><option value="">Всі SEO</option>${Object.entries(seos).map(([h,s])=>`<option ${siteFilt.seo===h?'selected':''} value="${h}">@${h} — ${s.name}</option>`).join('')}</select>
    <div style="margin-left:auto"><button class="btn bp bs" onclick="showAddSite()">+ Додати сайт</button></div>
  </div>
  ${selSites.size>0?`<div class="bb"><span style="color:var(--ac);font-family:var(--fm);font-weight:600">${selSites.size}</span><span style="color:var(--t2)">вибрано</span><button class="btn bg bs" onclick="showBulk('team')">↔ Команду</button><button class="btn bg bs" onclick="showBulk('seo')">👤 SEO</button><button class="btn bg bs" style="margin-left:auto" onclick="selSites=new Set();renderSites()">Зняти</button></div>`:''}
  <div class="cd" style="padding:0;overflow:hidden">
    <table><thead><tr><th style="width:40px">${chk(allSel,"toggleAllSites()")}</th><th>Домен ↑</th><th>Команда</th><th>SEO</th><th>Транзакцій</th><th style="text-align:right">Баланс</th><th></th></tr></thead>
    <tbody>${rowsHtml}</tbody></table>
    <div style="padding:12px 14px;border-top:1px solid var(--b1)">${pgr(filtered.length,sitePage,'setSitePage','site')}</div>
  </div>`;
}

function setSitePage(p){sitePage=p;renderSites();}

function deleteSite(domain){if(!confirm('Видалити сайт "'+domain+'"?'))return;delete DB.sites[domain];saveDB();renderSites();ub();}
function toggleSite(d){selSites.has(d)?selSites.delete(d):selSites.add(d);renderSites();}
function toggleAllSites(){
  const f=Object.entries(DB.sites).filter(([d,i])=>{
    if(siteFilt.search&&!d.toLowerCase().includes(siteFilt.search.toLowerCase()))return false;
    if(siteFilt.team&&i.team!==siteFilt.team)return false;
    if(siteFilt.seo&&i.seo!==siteFilt.seo)return false;
    return true;
  }).sort((a,b)=>a[0].localeCompare(b[0])).slice((sitePage-1)*PAGE,sitePage*PAGE);
  const all=f.every(([d])=>selSites.has(d));
  f.forEach(([d])=>all?selSites.delete(d):selSites.add(d));
  renderSites();
}

let txInfiniteCount=50;
function getTxFiltered(){
  const active=applyUserFilter(DB.transactions.filter(t=>!t.deleted));
  let result=active;
  if(txState.period!=='recent'){
    let from=txState.from,to=txState.to;
    if(txState.period!=='custom'){const pd=periodDates(txState.period==='all'?'':txState.period);from=pd.from;to=pd.to;}
    result=active.filter(t=>{
      if(from&&t.date<from)return false;
      if(to&&t.date>to)return false;
      return true;
    });
  }
  return result.filter(t=>{
    if(txState.type==='income'&&t.amount<0)return false;
    if(txState.type==='expense'&&t.amount>=0)return false;
    if(txState.cat&&t.category!==txState.cat)return false;
    return true;
  }).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}
function setTxState(key,val){
  txState[key]=val;
  txInfiniteCount=50;
  if(key==='type'){
    const active=applyUserFilter(DB.transactions.filter(t=>!t.deleted));
    const av=val==='income'?new Set(active.filter(t=>t.amount>=0&&t.category).map(t=>t.category))
      :val==='expense'?new Set(active.filter(t=>t.amount<0&&t.category).map(t=>t.category))

}

async function hDrop(e){e.preventDefault();document.getElementById('uz')?.classList.remove('dr');hFile(e.dataTransfer.files[0]);}
async function hFile(file){
  if(!file)return;
  const st=document.getElementById('import-status');
  st.innerHTML='<div class="alrt ai">Читаємо файл...</div>';
  const merge=document.getElementById('import-merge')?.checked;
  try{
    if(file.name.endsWith('.json')){
      const text=await file.text();const data=JSON.parse(text);
      if(merge){
        const maxId=DB.transactions.length?Math.max(...DB.transactions.map(x=>x.id)):0;
        if(data.transactions)data.transactions.forEach((t,i)=>{t.id=maxId+1+i;DB.transactions.push(t);});
        if(data.sites)Object.assign(DB.sites,data.sites);
        if(data.seos)Object.assign(DB.seos,data.seos);
      } else {
        const users=DB.users;Object.assign(DB,data);if(users&&!data.users)DB.users=users;
      }
      normalizeDBCase();
      saveDB();ub();
      st.innerHTML='<div class="alrt as">✓ JSON бекап імпортовано</div>';
      setTimeout(()=>sv('dash'),1500);return;
    }
    if(!window.XLSX)throw new Error('XLSX ще завантажується...');
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:null});
    const parsed=importRows(rows);
    if(merge){
      const maxId=DB.transactions.length?Math.max(...DB.transactions.map(x=>x.id)):0;
      parsed.transactions.forEach((t,i)=>{t.id=maxId+1+i;});
      DB.transactions.push(...parsed.transactions);
      Object.assign(DB.sites,parsed.sites);Object.assign(DB.seos,parsed.seos);
      if(parsed.teams)parsed.teams.forEach(t=>{if(!DB.teams.includes(t))DB.teams.push(t);});
      if(parsed.catIncome)parsed.catIncome.forEach(c=>{if(!DB.catIncome.includes(c))DB.catIncome.push(c);});
      if(parsed.catExpense)parsed.catExpense.forEach(c=>{if(!DB.catExpense.includes(c))DB.catExpense.push(c);});
    } else {
      const users=DB.users;
      DB.sites=parsed.sites;DB.seos=parsed.seos;DB.transactions=parsed.transactions;
      if(parsed.teams&&parsed.teams.length)DB.teams=parsed.teams;
      if(parsed.catIncome&&parsed.catIncome.length)DB.catIncome=parsed.catIncome;
      if(parsed.catExpense&&parsed.catExpense.length)DB.catExpense=parsed.catExpense;
      if(users)DB.users=users;
    }
    // Фінальний дедуп: зливаємо case-різні команди/категорії/SEO у DB
    normalizeDBCase();
    st.innerHTML='<div class="alrt ai">Зберігаємо у базу...</div>';
    saveDB();ub();
    const tc=parsed.transactions.length,sc=Object.keys(parsed.sites).length,se=Object.keys(parsed.seos).length;
    const splitInfo=parsed.splitGroups?` · розгорнуто ${parsed.splitGroups} split-груп → ${parsed.splitTxs} транзакцій`:'';
    st.innerHTML=`<div class="alrt as">✓ Імпортовано: ${tc.toLocaleString()} транзакцій · ${sc} сайтів · ${se} SEO${splitInfo}${merge?' (додано до існуючих)':''}</div>`;
    setTimeout(()=>sv('dash'),2000);
  }catch(e){st.innerHTML=`<div class="alrt" style="background:var(--rdd);border:1px solid rgba(255,77,109,.2);color:var(--rd)">Помилка: ${e.message}</div>`;}
}

function selectSeo(h){
  if(seoEditState.h&&seoEditState.dirty&&seoEditState.h!==h){
    if(confirm('Є незбережені зміни. Зберегти перед переходом?'))saveSeoEdit(seoEditState.h);
    else seoEditState={h:null,dirty:false};
  } else seoEditState={h:null,dirty:false};
  selSeoH=h;renderSettings();
}
function startSeoEdit(h){seoEditState={h,dirty:false};renderSettings();}
function cancelSeoEdit(h){
  if(seoEditState.dirty&&!confirm('Є незбережені зміни. Закрити без збереження?'))return;
  seoEditState={h:null,dirty:false};renderSettings();
}
function saveSeoEdit(h){
  const newHandle=(document.getElementById('seo-handle')?.value||h).trim();
  const newTeam=document.getElementById('seo-team')?.value||'';
  if(!newTeam){alert('Оберіть команду для SEO');return;}
  if(newHandle!==h){
    DB.seos[newHandle]={...DB.seos[h],team:newTeam};
    delete DB.seos[h];
    Object.values(DB.sites).forEach(s=>{if(s.seo===h){s.seo=newHandle;s.seoName=newHandle;}});
    DB.transactions.forEach(t=>{if(t.seo===h){t.seo=newHandle;t.seoName=newHandle;}});
    selSeoH=newHandle;
  } else {
    DB.seos[h]={...DB.seos[h],team:newTeam};
  }
  seoEditState={h:null,dirty:false};saveDB();renderSettings();
}
function deleteSeo(h){
  const cnt=Object.values(DB.sites).filter(s=>s.seo===h).length;
  if(!confirm(`Видалити SEO @${h}?${cnt>0?' Буде знято з '+cnt+' сайт(ів).':''}`))return;
  delete DB.seos[h];
  Object.values(DB.sites).forEach(s=>{if(s.seo===h){s.seo='deleted_user';s.seoName='Видалений користувач';}});
  DB.transactions.forEach(t=>{if(t.seo===h){t.seo='deleted_user';t.seoName='Видалений користувач';}});
  if(selSeoH===h)selSeoH=null;
  seoEditState={h:null,dirty:false};
  saveDB();renderSettings();
}

    <div class="fr"><div class="fl">Команда <span style="color:var(--rd)">*</span></div><select class="inp" id="seo-t-new"><option value="">— Виберіть —</option>${getTeams().slice().sort().map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>

function addSeoSave(){
  const h=document.getElementById('seo-h-new').value.trim();

  saveDB();closeModal();selSeoH=h;renderSettings();
}

function syncCatGroup(groupId){
  const parent=document.getElementById(groupId);if(!parent)return;
  const container=parent.closest('div');
  const children=container.querySelectorAll('input[type=checkbox]:not(#'+groupId+')');
  parent.checked=[...children].every(c=>c.checked);
}

async function addUserSave(){
  const email=document.getElementById('user-email').value.trim();
  const pass=document.getElementById('user-pass').value;
  const name=document.getElementById('user-name').value.trim();
  const role=document.getElementById('user-role').value;
  if(!email||!pass||!name){alert('Заповніть усі обов\'язкові поля');return;}
  if(DB.users.find(u=>u.email===email)){alert('Користувач з цим email уже існує');return;}
  const body={email,password:pass,name,role,teams:[],categories:[],seos:[],sites:[],canAdd:false,canEdit:false,canDelete:false,canAnalytics:true,canImport:false};
  if(role==='custom'){
    const teams=getTeams();
    const sites=Object.keys(DB.sites).sort();
    const cats=[...new Set([...(DB.catIncome||[]),...(DB.catExpense||[])])].sort();
    const seos=Object.keys(DB.seos).sort();
    teams.forEach(t=>{if(document.querySelector(`input[name="team-${t}"]:checked`))body.teams.push(t);});
    sites.forEach(s=>{if(document.querySelector(`input[name="site-${s}"]:checked`))body.sites.push(s);});
    cats.forEach(c=>{if(document.querySelector(`input[name="cat-${c}"]:checked`))body.categories.push(c);});
    seos.forEach(h=>{if(document.querySelector(`input[name="seo-${h}"]:checked`))body.seos.push(h);});
    body.canAdd=!!document.getElementById('user-can-add')?.checked;
    body.canEdit=!!document.getElementById('user-can-edit')?.checked;
    body.canDelete=!!document.getElementById('user-can-delete')?.checked;
    body.canAnalytics=!!document.getElementById('user-can-analytics')?.checked;
    body.canImport=!!document.getElementById('user-can-import')?.checked;
  }
  try{
    const{user}=await api('/api/users',{method:'POST',body});
    DB.users.push(user);
    closeModal();renderSettings();
  }catch(e){alert('Помилка: '+e.message);}
}

async function editUserSave(userId){
  const user=DB.users.find(u=>u.id===userId);
  if(!user)return;
  const pass=document.getElementById('user-pass').value;
  const name=document.getElementById('user-name').value.trim();
  const role=document.getElementById('user-role').value;
  if(!name){alert('Вкажіть ім\'я');return;}
  const body={name,role};
  if(pass)body.password=pass;
  if(role==='custom'){
    const teams=getTeams();
    const sites=Object.keys(DB.sites).sort();
    const cats=[...new Set([...(DB.catIncome||[]),...(DB.catExpense||[])])].sort();
    const seos=Object.keys(DB.seos).sort();
    body.teams=[];body.categories=[];body.seos=[];body.sites=[];
    teams.forEach(t=>{if(document.querySelector(`input[name="team-${t}"]:checked`))body.teams.push(t);});
    sites.forEach(s=>{if(document.querySelector(`input[name="site-${s}"]:checked`))body.sites.push(s);});
    cats.forEach(c=>{if(document.querySelector(`input[name="cat-${c}"]:checked`))body.categories.push(c);});
    seos.forEach(h=>{if(document.querySelector(`input[name="seo-${h}"]:checked`))body.seos.push(h);});
    body.canAdd=!!document.getElementById('user-can-add')?.checked;
    body.canEdit=!!document.getElementById('user-can-edit')?.checked;
    body.canDelete=!!document.getElementById('user-can-delete')?.checked;
    body.canAnalytics=!!document.getElementById('user-can-analytics')?.checked;
    body.canImport=!!document.getElementById('user-can-import')?.checked;
  }
  try{
    const{user:updated}=await api('/api/users/'+userId,{method:'PUT',body});
    const idx=DB.users.findIndex(u=>u.id===userId);
    if(idx>=0)DB.users[idx]=updated;
    closeModal();renderSettings();
  }catch(e){alert('Помилка: '+e.message);}
}

async function deleteUser(userId){
  if(userId===currentUser.id){alert('Не можна видалити власний акаунт');return;}
  const user=DB.users.find(u=>u.id===userId);
  if(!user||!confirm(`Видалити користувача "${user.name}"?`))return;
  try{
    await api('/api/users/'+userId,{method:'DELETE'});
    DB.users=DB.users.filter(u=>u.id!==userId);
    renderSettings();
  }catch(e){alert('Помилка: '+e.message);}
}

// ── CUSTOM DATEPICKER ──
const MONTHS_UA=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DOWS_UA=['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
let _cdpOpen=null;
function closeCdp(){if(_cdpOpen){_cdpOpen.remove();_cdpOpen=null;}document.removeEventListener('click',_cdpDocClick);}
function _cdpDocClick(e){if(_cdpOpen&&!_cdpOpen.contains(e.target))closeCdp();}
function openCdp(triggerEl,currentVal,onPick){
  closeCdp();
  const rect=triggerEl.getBoundingClientRect();
  const d=currentVal?new Date(currentVal+'T00:00'):new Date();
  let yr=d.getFullYear(),mo=d.getMonth();
  const div=document.createElement('div');
  div.className='cdp';
  div.style.position='fixed';
  div.style.top=(rect.bottom+4)+'px';
  div.style.left=rect.left+'px';
  _cdpOpen=div;
  function renderCal(){
    const todayStr=today();
    const selStr=currentVal||'';
    const first=new Date(yr,mo,1);
    const startDow=(first.getDay()+6)%7;
    const daysInMonth=new Date(yr,mo+1,0).getDate();
    const prevDays=new Date(yr,mo,0).getDate();
    let cells='';
    for(let i=0;i<startDow;i++){
      const dn=prevDays-startDow+1+i;
      cells+=`<div class="cdp-day other">${dn}</div>`;
    }
    for(let i=1;i<=daysInMonth;i++){
      const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      const cls=(ds===selStr?'sel':'')+(ds===todayStr?' today':'');
      cells+=`<div class="cdp-day ${cls}" data-d="${ds}">${i}</div>`;
    }
    const totalCells=startDow+daysInMonth;
    const rem=totalCells%7?7-totalCells%7:0;
    for(let i=1;i<=rem;i++){
      cells+=`<div class="cdp-day other">${i}</div>`;
    }
    div.innerHTML=`<div class="cdp-hdr"><div class="cdp-title">${MONTHS_UA[mo]} ${yr}</div><div class="cdp-nav"><button onclick="event.stopPropagation()">‹</button><button onclick="event.stopPropagation()">›</button></div></div>
      <div class="cdp-grid">${DOWS_UA.map(d=>`<div class="cdp-dow">${d}</div>`).join('')}${cells}</div>
      <div class="cdp-foot"><button class="cdp-clear" onclick="event.stopPropagation()">Очистити</button><button class="cdp-today" onclick="event.stopPropagation()">Сьогодні</button></div>`;
    div.querySelectorAll('.cdp-day:not(.other)').forEach(el=>{
      el.addEventListener('click',e=>{e.stopPropagation();currentVal=el.dataset.d;onPick(currentVal);closeCdp();});
    });
    const [prevBtn,nextBtn]=div.querySelectorAll('.cdp-nav button');
    prevBtn.addEventListener('click',e=>{e.stopPropagation();mo--;if(mo<0){mo=11;yr--;}renderCal();});
    nextBtn.addEventListener('click',e=>{e.stopPropagation();mo++;if(mo>11){mo=0;yr++;}renderCal();});
    div.querySelector('.cdp-clear').addEventListener('click',e=>{e.stopPropagation();onPick('');closeCdp();});
    div.querySelector('.cdp-today').addEventListener('click',e=>{e.stopPropagation();currentVal=todayStr;onPick(currentVal);closeCdp();});
  }
  renderCal();
  document.body.appendChild(div);
  setTimeout(()=>document.addEventListener('click',_cdpDocClick),10);
}
function cdpTrigger(id,label,val,onPickFn){
  return`<div class="cdp-trigger ${val?'has-val':''}" id="${id}" onclick="openCdp(this,'${val||''}',${onPickFn})">${label}: ${val||'—'}</div>`;
}
